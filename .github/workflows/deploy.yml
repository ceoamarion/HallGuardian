name: CI / Deploy HallGuardian

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── 1. Run API tests ──────────────────────────────────────────────────────────
  test:
    name: API Tests (42 suites)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Install backend deps
        run: cd HallGuardian && npm ci

      - name: Start backend server
        run: |
          cd HallGuardian
          PORT=4000 \
          JWT_SECRET=ci-test-secret-do-not-use-in-prod \
          DB_FILE=/tmp/hg_ci_test.db \
          SUPER_ADMIN_PASSWORD=HallGuardian@2024! \
          NODE_ENV=test \
          node server.js &
          for i in $(seq 1 10); do
            curl -sf http://localhost:4000/api/health && break || sleep 1
          done

      - name: Run test suites
        run: npm test
        env:
          VITE_API_URL: http://localhost:4000

  # ── 2. Build frontend ─────────────────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Set VITE_API_URL in GitHub → Settings → Secrets and variables → Actions
          # Value should be your Render backend URL, e.g.:
          # https://hallguardian-backend.onrender.com
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # GitHub Pages doesn't support SPA routing by default.
      # Copying index.html → 404.html makes GitHub Pages serve the React app
      # for any unknown route, letting TanStack Router handle it client-side.
      - name: Fix SPA routing for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── 3. Deploy frontend → GitHub Pages ────────────────────────────────────────
  deploy-pages:
    name: Deploy → GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── 4. (Optional) Deploy frontend → Vercel for custom domain ─────────────────
  # Uncomment after adding VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID to
  # GitHub repo → Settings → Secrets and variables → Actions
  #
  # deploy-vercel:
  #   name: Deploy → Vercel (hallguardian.com)
  #   runs-on: ubuntu-latest
  #   needs: test
  #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with: { node-version: "20", cache: npm }
  #     - run: npm ci
  #     - run: npm run build
